{% extends "base.html" %}
{% block title %}Login{% endblock title %}
{% block content %}
<style>
    .login-box {
        background-color: hsl(218, 41%, 15%);
        background-image: radial-gradient(650px circle at 0% 0%, hsl(218, 41%, 35%) 15%, hsl(218, 41%, 30%) 35%, hsl(218, 41%, 20%) 75%, hsl(218, 41%, 19%) 80%, transparent 100%);
        min-height: 80vh;
        display: flex;
        align-items: center;
        border-radius: 15px;
    }
    .glass-card {
        background: hsla(0, 0%, 100%, 0.8) !important;
        backdrop-filter: blur(25px);
        border: 1px solid rgba(255,255,255,0.3);
    }
</style>

<div class="container my-5">
    <div class="login-box shadow-lg p-5">
        <div class="row w-100 align-items-center">
            <div class="col-lg-6 text-white mb-5 mb-lg-0">
                <h1 class="display-3 fw-bold">Agr Med <br> <span class="text-info">Secure Login</span></h1>
                <p class="opacity-70 fs-5">Login to access your personalized medical dashboard and track your orders in real-time.</p>
            </div>
            <div class="col-lg-6">
                <div class="card glass-card shadow-lg p-4">
                    <form method="POST">
                        {% csrf_token %}
                        <h3 class="text-center mb-4">Account Login</h3>
                        <div class="form-outline mb-4">
                            <label class="form-label">Username</label>
                            <input type="text" name="user_login" class="form-control" required />
                        </div>
                        <div class="form-outline mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="user_pass" class="form-control" required />
                        </div>
                        <button type="submit" class="btn btn-primary btn-block w-100 mb-4">Enter Dashboard</button>
                        <div class="text-center">
                            <p>Not registered? <a href="{% url 'signup' %}" class="text-primary">Create an account</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
